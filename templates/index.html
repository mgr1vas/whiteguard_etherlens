<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethershield | Link Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-slate-900 text-white font-sans antialiased">

    <div class="max-w-3xl mx-auto mt-20 p-8">
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">Ethershield Scanner</h1>
            <p class="text-slate-400">Analyze suspicious URLs and domains instantly.</p>
        </div>

        <div class="bg-slate-800 border border-slate-700 rounded-xl p-8 shadow-2xl">
            <form hx-post="/scan" hx-target="#scan-results" hx-indicator="#loading">
                <div class="relative">
                    <input 
                        type="url" 
                        name="target_url" 
                        required
                        placeholder="https://suspicious-link.com" 
                        class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-4 py-4 focus:outline-none focus:border-blue-500 transition-colors"
                    >
                </div>

                <div class="mt-6 flex justify-end items-center">
                    <div id="loading" class="htmx-indicator mr-4 text-blue-400 font-medium">
                        Scanning against threat intel databases...
                    </div>
                    
                    <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-lg font-bold transition-all">
                        Scan Target
                    </button>
                </div>
            </form>
        </div>

        <div id="scan-results" class="mt-8"></div>
    </div>

    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: block; }
        .htmx-request.htmx-indicator { display: block; }
    </style>
</body>
</html>

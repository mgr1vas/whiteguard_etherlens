<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etherlens by Whiteguard-Threat Scanner</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        html { scroll-behavior: smooth; }
        .hidden { display: none !important; }
    </style>
</head>

<body class="bg-black text-white font-sans antialiased min-h-screen flex flex-col relative overflow-x-hidden">
    
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[500px] bg-red-900/10 blur-[120px] rounded-full pointer-events-none -z-10"></div>

    <header class="w-full border-b border-white/10 bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <a href="/" class="text-2xl font-black tracking-widest hover:text-red-400 transition-colors">
                WHITE<span class="text-red-600">GUARD</span>
            </a>
            <div class="flex items-center gap-4">
                <span class="hidden md:inline-flex items-center gap-1.5 px-3 py-1 text-[10px] uppercase tracking-wider font-bold bg-amber-500/10 text-amber-500 border border-amber-500/20 rounded-full">
                    <span class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></span>
                    Beta / Under Development
                </span>
                
                <a href="https://whiteguard.org" target="_blank" class="text-sm font-medium text-slate-400 hover:text-white flex items-center gap-2 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back to Main Site
                </a>
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center pt-20 pb-24 px-6">
        <div class="text-center max-w-3xl mb-12 relative">
            <h1 class="text-5xl font-bold mb-4">
                Instant <span class="text-red-500 drop-shadow-[0_0_15px_rgba(239,68,68,0.5)]">Threat</span> Analysis
            </h1>
            <p class="text-lg text-slate-400">Paste any suspicious URL to instantly check it against our local decoy database.</p>
        </div>

        <div class="w-full max-w-2xl bg-zinc-900/80 backdrop-blur-sm border border-zinc-800 rounded-2xl p-8 shadow-2xl relative z-10">
            
            <form id="scanForm">
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="w-6 h-6 text-slate-500 group-focus-within:text-red-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                    </div>
                    <input 
                        type="url" 
                        id="targetUrl" 
                        required
                        placeholder="e.g. https://suspicious-domain.com/login" 
                        class="w-full bg-black border border-zinc-700 text-white rounded-xl pl-12 pr-4 py-5 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all text-lg"
                    >
                </div>

                <div class="mt-8 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <div id="loadingIndicator" class="hidden text-red-400 font-medium flex items-center gap-2">
                        <svg class="animate-spin h-5 w-5 text-red-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Simulating scan...
                    </div>
                    
                    <button type="submit" id="scanButton" class="w-full sm:w-auto bg-red-600 hover:bg-red-500 text-white px-8 py-4 rounded-xl font-bold tracking-wide transition-all shadow-[0_0_20px_rgba(220,38,38,0.4)] hover:shadow-[0_0_30px_rgba(220,38,38,0.7)] ml-auto disabled:opacity-50 disabled:cursor-not-allowed">
                        Scan Target
                    </button>
                </div>
            </form>
        </div>

        <div id="scan-results" class="w-full max-w-2xl mt-8"></div>
    </main>

    <section class="py-24 bg-black border-t border-zinc-800 flex flex-col items-center justify-center relative overflow-hidden">
        <div class="absolute w-[300px] h-[300px] bg-red-900/10 blur-[80px] rounded-full pointer-events-none"></div>
        <img src="static/whiteguard-logo.png" alt="Whiteguard Logo" class="w-64 md:w-80 lg:w-96 object-contain opacity-70 hover:opacity-100 transition-all duration-700 hover:scale-105 z-10 drop-shadow-2xl">
        <p class="mt-8 text-zinc-600 font-medium tracking-widest uppercase text-sm z-10">Advanced Cyber Defense</p>
    </section>

    <footer class="py-6 bg-black border-t border-zinc-900 mt-auto">
        <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-xs text-zinc-600">
            <div>&copy; 2026 Whiteguard. All rights reserved.</div>
        </div>
    </footer>
    <script src="scanner.js"></script>
</body>
</html>
